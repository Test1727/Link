<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonntag Nachmittag</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f5f9ff, #e3edfa);
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 40px 50px;
      box-shadow: 0 20px 60px rgba(0,20,40,0.15);
      text-align: center;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      font-size: 2.2rem;
      color: #1a2634;
      margin-bottom: 30px;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 10px;
    }
    .btn {
      display: inline-block;
      padding: 16px 32px;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 600;
      text-decoration: none;
      color: white;
      transition: all 0.2s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .btn-app {
      background: #0b6e4f;
    }
    .btn-app:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(11,110,79,0.4);
    }
    .btn-web {
      background: #2c3e66;
    }
    .btn-web:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(44,62,102,0.4);
    }
    .hint {
      margin-top: 25px;
      font-size: 0.9rem;
      color: #4a5b72;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>☀️ Was sollen wir Sonntag Nachmittag machen</h1>

  <div class="btn-group">
    <!-- App-Button -->
    <a href="chatgpt://chat?q=Gebe%20Informationen%20aus%20zu%20einer%20sch%C3%B6nen%20Sonntag-Nachmittag%20Besch%C3%A4ftigung"
       class="btn btn-app">
      📱 In der App fragen
    </a>

    <!-- Web-Button (Fallback) -->
    <a href="https://chat.openai.com/chat?q=Gebe%20Informationen%20aus%20zu%20einer%20sch%C3%B6nen%20Sonntag-Nachmittag%20Besch%C3%A4ftigung"
       target="_blank"
       rel="noopener noreferrer"
       class="btn btn-web">
      🌐 Im Browser fragen
    </a>
  </div>

  <p class="hint">🔗 Der App‑Button öffnet die ChatGPT‑App (wenn installiert), der Browser‑Button die Webseite.</p>
</div>
</body>
</html>
