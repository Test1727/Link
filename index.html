<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonntag Nachmittag</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f5f9ff, #e3edfa);
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 40px 45px;
      box-shadow: 0 20px 60px rgba(0,20,40,0.15);
      text-align: center;
      max-width: 700px;
      width: 100%;
    }
    h1 {
      font-size: 2.2rem;
      color: #1a2634;
      margin-bottom: 30px;
      letter-spacing: -0.5px;
    }
    h1::after {
      content: " ☀️";
    }
    .btn {
      display: inline-block;
      background: #2c3e66;
      color: white;
      font-size: 1.4rem;
      font-weight: 600;
      padding: 18px 48px;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(44,62,102,0.35);
      transition: all 0.2s ease;
      width: 100%;
      margin-bottom: 20px;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(44,62,102,0.45);
    }
    .btn:active {
      transform: scale(0.97);
    }
    .hint {
      font-size: 0.9rem;
      color: #3d5068;
      opacity: 0.8;
    }
    .hint span {
      background: #eef3f9;
      padding: 2px 12px;
      border-radius: 30px;
      font-weight: 500;
    }
    @media (max-width: 550px) {
      .card { padding: 30px 20px; }
      h1 { font-size: 1.7rem; }
      .btn { font-size: 1.1rem; padding: 14px 24px; }
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Was sollen wir Sonntag Nachmittag machen</h1>

  <button class="btn" id="openGptBtn">🤖 GPT fragen</button>

  <p class="hint">
    🔹 <span>Klick öffnet ChatGPT</span> – automatisch in der App (mobil) oder im Browser (Desktop).<br>
    🔹 Der Prompt steht sofort im Chat-Feld – du musst nur <span>Absenden</span> drücken.
  </p>
</div>

<script>
  (function() {
    const PROMPT = `Du bist mein persönlicher Freizeit-Coach für den Sonntagnachmittag (Zeitraum 14 bis 18 Uhr). Stelle mir eine abwechslungsreiche Auswahl an Aktivitäten zusammen, aufgeteilt in folgende Kategorien:

1. Aktiv & Draußen (Bewegung, Natur, frische Luft)
2. Gemütlich & Entspannt (Café, Lesen, Wellness, Zuhause)
3. Kreativ & Kulturell (Museum, Basteln, Musik, Fotografie)
4. Eine völlig unerwartete, ausgefallene Idee

Gib mir zu jedem Vorschlag:
- Eine bildhafte, kurze Beschreibung, was genau wir tun.
- Den ungefähren Zeitaufwand.
- Eine grobe Kosten-Einschätzung (günstig, mittel, teuer).
- Eine Empfehlung, ob sich die Aktivität besser allein, zu zweit, mit der Familie oder in einer Gruppe lohnt.

Berücksichtige in deiner Antwort, dass wir gerade Sommer haben und Temperaturen um die 30 Grad. Wir suchen eher ruhige, entspannte Aktivitäten, keine Action. Wir wohnen in Essen. Gib mir konkrete Vorschläge, die in Essen oder Umgebung umsetzbar sind.`;

    document.getElementById('openGptBtn').addEventListener('click', function() {
      const encoded = encodeURIComponent(PROMPT);
      window.open(`https://chat.openai.com/?q=${encoded}`, '_blank');
    });
  })();
</script>

</body>
</html>
