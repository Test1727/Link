    .btn-web {

    }

      box-shadow: 0 14px 32px rgba(44,62,102,0.4);
    }
    .btn-web:active {

    }

      color: #3d5068;
      opacity: 0.8;
    }
    .hint span {
      background: #eef3f9;
      padding: 2px 12px;
      border-radius: 30px;
      font-weight: 500;
    }
    @media (max-width: 550px) {
      .card { padding: 30px 20px; }
      h1 { font-size: 1.7rem; }
      .btn { font-size: 1.1rem; padding: 14px 24px; }

</head>
